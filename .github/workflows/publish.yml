name: Publish to npmjs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish.yml
      - README.md
      - bun.lock
      - bunfig.toml
      - docs/**
      - package.json
      - src/**
      - tests/**
      - tsconfig.json
      - tsconfig.test.json
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: [1.3.11, latest]
        typescript-version: [6.0.2, latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pin TypeScript for matrix entry
        run: bun add --dev --exact typescript@${{ matrix.typescript-version }}

      - name: Typecheck
        run: bunx tsc --noEmit --project tsconfig.test.json

      - name: Build package
        run: bun run build

      - name: Run tests
        run: bun test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Configure npm registry authentication
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Check whether this version is already published
        id: registry
        run: |
          bun --eval '
            const packageJson = await Bun.file("package.json").json();
            const packagePath = packageJson.name.startsWith("@")
              ? packageJson.name.replace("/", "%2f")
              : packageJson.name;
            const response = await fetch(`https://registry.npmjs.org/${packagePath}/${packageJson.version}`);

            if (!(response.ok || response.status === 404)) {
              console.log(`Unexpected npm registry response status: ${response.status}`);
              process.exit(1);
            }

            console.log(`publish=${response.status === 404 ? "true" : "false"}`);
          ' >> "$GITHUB_OUTPUT"

      - name: Require NPM_TOKEN when publish is needed
        if: steps.registry.outputs.publish == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish baobox to npm."
            exit 1
          fi

      - name: Publish package
        if: steps.registry.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public --ignore-scripts --registry https://registry.npmjs.org

      - name: Skip duplicate version
        if: steps.registry.outputs.publish != 'true'
        run: echo "package.json version is already published on npm; skipping."
